[project]
name = "state-ratio-experiment"
version = "0.1.0"
description = "State-Corrected GRPO: Recovering the state distribution ratio via deterministic transitions"
requires-python = ">=3.10"
dependencies = [
    "verl",
    "torch",
    "datasets",
]

[project.optional-dependencies]
test = [
    "pytest",
]

# Use Chinese mirrors for faster package downloads
[[tool.uv.index]]
url = "https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple"
name = "tuna"
default = true

[[tool.uv.index]]
url = "https://download.pytorch.org/whl/cu124"
name = "pytorch-cu124"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu124" }