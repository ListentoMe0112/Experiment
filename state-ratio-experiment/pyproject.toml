[project]
name = "state-ratio-experiment"
version = "0.1.0"
description = "State-Corrected GRPO: Recovering the state distribution ratio via deterministic transitions"
requires-python = ">=3.10,<3.11"
dependencies = [
    # verl from git main branch (post-0.7.1 with vLLM rollout bug fixes)
    "verl @ git+https://github.com/volcengine/verl.git@v0.7.1",
    # vLLM 0.9.2 requires torch==2.7.0 and transformers>=4.51.1
    "torch==2.7.0",
    "transformers>=4.51.1,<4.53",
    "vllm==0.9.2",
    "datasets",
    "flash-attn>=2.7.4",
    "tensordict>=0.8.0,<0.11.0",
]

[project.optional-dependencies]
test = [
    "pytest",
]

# Use Chinese mirrors for faster package downloads
# Note: PyTorch 2.7.0 on PyPI bundles CUDA 12.6 (nvidia-cu12 deps),
# so no need for a separate pytorch.org index.
[[tool.uv.index]]
url = "https://mirrors.cloud.tencent.com/pypi/simple"
name = "tencent"
default = true